<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스미스가좋아하는 테라스 · 메뉴 선택</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <p class="header-badge">삼청동 브런치 & 파스타</p>
      <h1>스미스가좋아하는 테라스</h1>
      <p class="header-desc">메뉴 <strong id="menuTotal">0</strong>개 · 여러 명이 함께 선택하고 전체 집계를 확인하세요</p>
      <a class="header-link" href="https://map.naver.com/p/entry/place/994681330" target="_blank" rel="noopener noreferrer">
        네이버 지도에서 보기 →
      </a>
    </div>
  </header>

  <div class="server-status" id="serverStatus" hidden></div>

  <section class="user-bar" id="userBar">
    <div class="user-bar-inner">
      <div class="user-field">
        <label for="userNameInput">이름</label>
        <input id="userNameInput" type="text" maxlength="20" placeholder="이름을 입력하세요" />
        <button type="button" class="btn-save-name" id="userNameSave">저장</button>
      </div>
      <div class="user-meta">
        <a class="room-link" id="roomInfo" href="?room=terrace">방 코드: terrace</a>
        <span class="participant-count" id="participantCount">0명 참여</span>
      </div>
    </div>
    <p class="user-hint">메뉴 선택은 바로 가능합니다. 이름을 저장하면 다른 사람과 선택이 공유됩니다.</p>
  </section>

  <main class="main">
    <ul class="menu-notes" id="menuNotes"></ul>
    <nav class="category-nav" id="categoryNav" aria-label="메뉴 카테고리"></nav>
    <section class="menu-grid" id="menuGrid" aria-label="메뉴 목록"></section>
  </main>

  <aside class="summary" id="summary" aria-label="선택 집계">
    <div class="summary-header">
      <h2>선택 집계</h2>
      <span class="summary-count" id="summaryCount">0개</span>
    </div>
    <div class="summary-tabs" id="summaryTabs">
      <button type="button" class="summary-tab active" data-view="mine">내 메뉴</button>
      <button type="button" class="summary-tab" data-view="all">전체 집계</button>
    </div>
    <div class="summary-list" id="summaryList">
      <p class="summary-empty">이름을 입력하고 메뉴를 선택하세요.</p>
    </div>
    <div class="summary-footer">
      <div class="summary-total">
        <span id="summaryLabel">내 총 금액</span>
        <strong id="summaryTotal">0원</strong>
      </div>
      <button type="button" class="btn-clear" id="clearBtn" disabled>내 선택 초기화</button>
      <button type="button" class="btn-reset-room" id="resetRoomBtn" disabled>전체 초기화</button>
    </div>
  </aside>

  <button type="button" class="summary-toggle" id="summaryToggle" aria-expanded="false" aria-controls="summary">
    <span id="toggleLabel">주문 보기</span>
    <span class="toggle-badge" id="toggleBadge">0</span>
  </button>

  <script src="menu-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
